<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro | Zernman</title>


<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet" href="../style/cadastro.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


</head>


<body>



<header class="topo">


<div class="logo">

<img src="../assets/logo.png" alt="Zernman">

</div>


<a href="login.html">

Já tenho conta

</a>


</header>







<main class="cadastro-area">



<div class="cadastro-container">






<div class="cadastro-lateral">


<img src="../assets/logo.png" alt="Zernman">


<h1>
Crie sua conta
</h1>


<p>
Tenha acesso aos melhores materiais para sua construção.
</p>



</div>









<div class="cadastro-box">


<h2>
Cadastro
</h2>


<p>
Preencha seus dados para começar.
</p>






<form id="formCadastro">







<label>
Nome completo
</label>


<div class="campo">

<i class="fa-solid fa-user"></i>

<input 
type="text"
id="nome"
placeholder="Digite seu nome completo"
required
>

</div>







<label>
CPF
</label>


<div class="campo">

<i class="fa-solid fa-id-card"></i>

<input 
type="text"
id="cpf"
placeholder="Digite seu CPF"
required
>

</div>







<label>
Telefone
</label>


<div class="campo">


<i class="fa-solid fa-phone"></i>


<input 
type="tel"
id="telefone"
placeholder="Digite seu telefone"
required
>

</div>








<label>
E-mail
</label>


<div class="campo">


<i class="fa-solid fa-envelope"></i>


<input 
type="email"
id="email"
placeholder="Digite seu e-mail"
required
>

</div>








<label>
Confirmar E-mail
</label>


<div class="campo">


<i class="fa-solid fa-envelope-circle-check"></i>


<input 
type="email"
id="confirmarEmail"
placeholder="Confirme seu e-mail"
required
>

</div>







<label>
Senha
</label>


<div class="campo">


<i class="fa-solid fa-lock"></i>


<input 
type="password"
id="senha"
placeholder="Crie uma senha"
required
>

</div>







<label>
Confirmar senha
</label>


<div class="campo">


<i class="fa-solid fa-lock"></i>


<input 
type="password"
id="confirmarSenha"
placeholder="Confirme sua senha"
required
>

</div>








<label class="termos">


<input type="checkbox" id="termos">


Aceito os termos e condições


</label>







<button class="criar" type="submit">


Criar Conta


<i class="fa-solid fa-user-plus"></i>


</button>







<div class="ou">

<span></span>

OU

<span></span>

</div>







<button type="button" class="email-codigo">


<i class="fa-solid fa-envelope"></i>


Cadastrar usando código por e-mail


</button>







<button type="button" class="google">


<i class="fa-brands fa-google"></i>


Continuar com Google


</button>








</form>








<div class="login-link">


Já possui cadastro?


<a href="login.html">

Entrar

</a>


</div>




</div>





</div>


</main>








<footer>


<p>
© 2026 Zernman - Materiais para Construção
</p>


</footer>






<script src="../js/cadastro.js"></script>



</body>

</html>
