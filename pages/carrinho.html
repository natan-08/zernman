<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrinho | Zernman</title>


<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet" href="../style/carrinho.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


</head>


<body>


<header class="topo">

<div class="logo">

<i class="fa-solid fa-hammer"></i>

Zernman

</div>


<nav>

<a href="../index.html">
Home
</a>

<a href="tela-produto.html">
Produtos
</a>

<a href="favoritos.html">
Favoritos
</a>

</nav>

</header>





<section class="titulo">

<div class="container">

<h1>
Meu Carrinho
</h1>

<p>
Revise seus materiais antes de finalizar a compra.
</p>

</div>

</section>





<main class="carrinho">


<div class="container">


<section class="lista">


<h2>
Produtos
</h2>



<div class="produto">


<img src="../imagens/produtos/furadeira.png">



<div class="info">


<h3>
Furadeira de Impacto Bosch GSB 550
</h3>


<span>
Ferramentas
</span>


<strong>
R$ 379,90
</strong>


<div class="quantidade">


<button class="menos">
-
</button>


<input value="1">


<button class="mais">
+
</button>


</div>


</div>



<button class="remover">

<i class="fa-solid fa-trash"></i>

</button>


</div>




</section>







<section class="resumo">


<h2>
Resumo da compra
</h2>



<div class="linha">

<span>
Subtotal
</span>

<strong id="subtotal">
R$ 379,90
</strong>

</div>



<div class="linha">

<span>
Frete
</span>

<strong>
R$ 25,00
</strong>

</div>



<div class="cupom">

<input placeholder="Cupom de desconto">


<button>
Aplicar
</button>

</div>




<div class="total">


<span>
Total
</span>


<h2>
R$ 404,90
</h2>


</div>




<button class="finalizar">

Finalizar Compra

<i class="fa-solid fa-arrow-right"></i>

</button>



</section>


</div>


</main>






<footer>

<p>
© 2026 Zernman - Materiais para Construção
</p>

</footer>




<script src="../js/carrinho.js"></script>


</body>

</html>
