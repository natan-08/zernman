<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Zernman Construções</title>

    <link rel="stylesheet" href="/style/listaprodutos.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >
</head>
<body>

    <!-- Cabeçalho -->
    <header class="top-header">

        <button class="menu-btn">
            <i class="fas fa-bars"></i>
        </button>

        <div class="search-box">
            <input
                type="text"
                id="campoBusca"
                placeholder="O que você está procurando?"
            >

            <button>
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div class="header-actions">

            <button class="cart-btn">
                <i class="fas fa-cart-shopping"></i>
            </button>

            <button class="login-btn">
                <i class="fas fa-user"></i>
                <span>Entrar</span>
            </button>

        </div>

    </header>

    <!-- Breadcrumb -->
    <div class="breadcrumb">
        Home / <strong>Produtos</strong>
    </div>

    <!-- Conteúdo -->
    <main class="products-page">

        <!-- Filtros -->
        <aside class="filters">

            <h3>Filtros</h3>

            <div class="filter-group">
                <h4>Categorias</h4>

                <div id="listaCategorias"></div>
            </div>

            <div class="filter-group">
                <h4>Faixa de Preço</h4>

                <label><input type="checkbox"> Até R$100</label>
                <label><input type="checkbox"> R$100 - R$500</label>
                <label><input type="checkbox"> Acima de R$500</label>
            </div>

            <div class="filter-group">
                <h4>Marcas</h4>

                <div id="listaMarcas"></div>
            </div>

        </aside>

        <!-- Produtos -->
        <section class="products-content">

            <div class="products-header">

                <div>
                    <h2>Listagem de Produtos</h2>
                    <span id="totalProdutos">0 produtos</span>
                </div>

                <select id="ordenacao">
                    <option>Mais vendidos</option>
                    <option>Menor preço</option>
                    <option>Maior preço</option>
                </select>

            </div>

            <div class="products-grid" id="productsGrid">
                <!-- JS preenche -->
            </div>

            <div class="pagination">
                <button></button>
                <button class="active">1</button>
                <button>2</button>
                <button>3</button>
                <button></button>
            </div>

        </section>

    </main>

    <script src="/js/listaprodutos.js"></script>

</body>
</html>
