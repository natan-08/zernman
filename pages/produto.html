<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto</title>
    <!--conexão com o CSS-->
    <link rel="stylesheet" href="/style/produto.css">
    <!--logo da empresa para o navegador-->
    <link rel="icon" type="image/png" href="/assets/logo-navegador.png">
</head>

<body>
    <!--CABEÇALHO-->
    <!-- HEADER -->
    <header class="header">

        <div class="header-top">

            <button class="menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="logo">
                <img src="assets/logo.png" alt="Logo">
            </div>

            <div class="search-box">
                <input type="text" placeholder="Buscar produtos">
                <button>
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <div class="header-actions">

                <button class="icon-btn">
                    <i class="fa-solid fa-cart-shopping"></i>
                </button>

                <button class="icon-btn">
                    <i class="fa-solid fa-user"></i>
                    <span>Entrar</span>
                </button>

            </div>

        </div>

    </header>

    <!--AREA DOS DADOS DO PRODUTO-->
    <div class="area-detalhes">
        <div class="area-imagens">
            <div class="img-lateral" id="img-lateral">
                <!--não criamos tag img aqui porque não temos como
                saber a quantidade de imagens que o lojista vai
                cadastrar-->

            </div>
            <div class="img-principal" id="img-principal">
                <img id="imagem-maior">
            </div>
        </div>
        <div class="area-textos">
            <!--nome do produto-->
            <h1 id="nome-produto"></h1>
            <!--area das avaliações do produto-->
            <div class="avaliacoes-produtos">
                <img id="estrela-avaliacao">
                <span id="valor-avaliacão"></span>
            </div>
            <p id="preço-antigo"></p>
            <!--area do preco promocional-->
            <div class="preco-promocional">
                <p id="preco-promocional"></p>
                <span id="desconto"></span>
            </div>
            <div class="quantidade">
            <button id="diminuir">-</button>
            <button id="numero-quantidade"></button>
            <button id="aumentar">+</button>
    </div>
            <div class="bnt-add-carrinho">
                <button id="bnt-add-carrinho"></button>
            </div>
            <div class="btn-comprar">
                <button id="btn-comprar"></button>
            </div>
            <div class="area-frete">
                <p>Calcular o frete</p>
                <imput id="frete">
                    <button id="btn-calcular-frete">calcular</button>
            </div>

   

    <!--FAZENDO A CONEXÃO COM O JAVASCRIPT-->
    <script src="/js/produto.js"></script>
</body>

</html>
