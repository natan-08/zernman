<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Zernman</title>


<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<link rel="stylesheet" href="../style/login.css">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


</head>


<body>


<header class="topo">


<div class="logo">

<img src="../assets/logo.png" alt="Zernman">

</div>


<a href="../index.html">

Voltar para loja

</a>


</header>






<main class="login-area">


<div class="login-container">



<div class="login-imagem">


<div>


<img src="../assets/logo.png" alt="Zernman">



<p>
Materiais para construção com qualidade e confiança.
</p>


</div>


</div>







<div class="login-box">


<h2>
Entrar na conta
</h2>


<p>
Acesse sua conta para acompanhar seus pedidos.
</p>




<form>



<label>
E-mail
</label>


<div class="campo">


<i class="fa-solid fa-envelope"></i>


<input 
type="email"
id="email"
placeholder="Digite seu e-mail"
>


</div>







<label>
Senha
</label>


<div class="campo">


<i class="fa-solid fa-lock"></i>



<input 
type="password"
id="senha"
placeholder="Digite sua senha"
>




<button type="button" id="mostrarSenha">

<i class="fa-solid fa-eye"></i>

</button>


</div>






<a class="esqueci" href="#">

Esqueci minha senha

</a>






<button class="entrar">

Entrar

<i class="fa-solid fa-arrow-right"></i>

</button>





</form>






<div class="cadastro">


Ainda não possui conta?


<a href="cadastro.html">

Criar cadastro

</a>


</div>




</div>



</div>


</main>






<footer>

<p>
© 2026 Zernman - Materiais para Construção
</p>


</footer>





<script src="../js/login.js"></script>


</body>

</html>
